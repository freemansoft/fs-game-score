name: Semantic Label Localization

on: [push, pull_request]

jobs:
  semantic-l10n:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check semantic labels are localized
        run: python3 tool/check_semantic_l10n.py
